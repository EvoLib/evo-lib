# Example config for GapNavigator

random_seed: 42
max_generations: 900
parent_pool_size: 20
offspring_pool_size: 60
num_elites: 3

evolution:
  strategy: mu_plus_lambda

modules:
  sensors:
    type: vector
    dim: 12  # 6 lengths + 6 angles
    initializer: uniform
    bounds: [0.0, 1.0]
    mutation:
      strategy: constant
      probability: 0.30
      strength: 0.10
      min_strength: 0.01
      max_strength: 0.35

  brain:
    type: evonet
    dim: [8, 8, 1]
    activation: [linear, tanh, tanh]
    connectivity:
      recurrent: []
      scope: adjacent
      density: 1.0
    weights:
      initializer: normal
      std: 0.45
      bounds: [-2.0, 2.0]
    bias:
      initializer: normal
      std: 0.2
      bounds: [-1.0, 1.0]
    mutation:
      strategy: constant
      probability: 0.14
      strength: 0.10
      min_strength: 0.01
      max_strength: 0.35
