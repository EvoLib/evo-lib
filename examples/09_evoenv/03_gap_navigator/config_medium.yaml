# Example config for GapNavigator

random_seed: 42
max_generations: 50
parent_pool_size: 30
offspring_pool_size: 90
num_elites: 2

evolution:
  strategy: mu_plus_lambda

modules:
  sensors:
    type: vector
    dim: 12  # 6 lengths + 6 angles
    initializer: uniform
    bounds: [0.0, 1.0]
    mutation:
      strategy: constant
      probability: 0.25
      strength: 0.08
      min_strength: 0.01
      max_strength: 0.30

  brain:
    type: evonet
    dim: [8, 12, 1]
    activation: [linear, tanh, tanh]
    connectivity:
      recurrent: []
      scope: adjacent
      density: 1.0
    weights:
      initializer: normal
      std: 0.4
      bounds: [-2.0, 2.0]
    bias:
      initializer: normal
      std: 0.2
      bounds: [-1.0, 1.0]
    mutation:
      strategy: constant
      probability: 0.12
      strength: 0.08
      min_strength: 0.01
      max_strength: 0.30
